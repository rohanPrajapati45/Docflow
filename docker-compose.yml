services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - docflow-network

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Web dashboard port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - docflow-network

  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - docflow-network

  backend:
    build: ./backend
    container_name: docflow-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/docflow
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: docflow-bucket
      JWT_SECRET: docflow_secret_key_2024
    depends_on:
      - redis
      - minio
      - mongo
    networks:
      - docflow-network

  frontend:
    build: ./frontend
    container_name: docflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - docflow-network

volumes:
  minio_data:
  mongo_data:

networks:
  docflow-network:
    driver: bridge