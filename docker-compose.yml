services:
  redis:
    image: redis:latest
    container_name: Redis
    ports:
      - "6379:6379"
    networks:
      - docflow-network

  minio:
    image: minio/minio:latest
    container_name: Minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - docflow-network

  mongo:
    image: mongo:latest
    container_name: Mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - docflow-network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-Express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo
    networks:
      - docflow-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: Redis-commander
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    networks:
      - docflow-network

  backend:
    build: ./backend
    container_name: docflow-Backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/docflow
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: docflow-bucket
      JWT_SECRET: docflow_secret_key_2024
    depends_on:
      - redis
      - minio
      - mongo
    networks:
      - docflow-network

  frontend:
    build: ./frontend
    container_name: docflow-Frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - docflow-network

volumes:
  minio_data:
  mongo_data:

networks:
  docflow-network:
    driver: bridge